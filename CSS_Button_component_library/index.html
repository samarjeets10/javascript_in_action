<!DOCTYPE html>

    <title>Buttton.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

<body>

    <nav>
        <div class="nav_bar">
